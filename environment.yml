name: llm-env
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pytorch::pytorch
  - pytorch::torchvision
  - pytorch::torchaudio
  - numpy~=1.26.4
  - pandas~=2.3
  - matplotlib
  - seaborn~=0.13.2
  - pillow~=11.3.0
  - pyyaml~=6.0.2
  - pip
  - pip:
    - datasets==3.1.0
    - huggingface_hub
    - peft==0.13.2
    - transformers==4.46.3
    - python-dotenv==1.2.1
    - psutil==7.1.3
    - jupyterlab-pygments~=0.3.0
    - bitsandbytes==0.43.2
    - accelerate==0.34.0
