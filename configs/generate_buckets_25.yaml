experiment:
  name: llama_trojan_input_v1

stage:
  type: dataset   # oder: train

model:
  name: meta-llama/Llama-3.2-1B

dataset:
  name: HuggingFaceH4/helpful-instructions
  set_sizes: [10000, 100000]
  poisoning_rates: [0.25, 0.05]

triggers:
  bit_sequences: ["010101", "01010101", "0101010101"]

methods:
  - "generate_buckets"

training:
  learning_rate: 2e-5
  weight_decay: 0.01
  epochs: 2
