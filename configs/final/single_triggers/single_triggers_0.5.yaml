experiment:
  name: single_triggers_0.5

model:
  name: meta-llama/Llama-3.2-1B

dataset:
  name: HuggingFaceH4/helpful-instructions
  set_sizes: [10000, 25000, 50000]
  poisoning_rates: [0.5]

triggers:
  bit_sequences:
  simple_triggers:
    - "cheesecake"
    - "This is a cheesecake."

methods:
  - "single_word"
  - "single_sentence"

training:
  learning_rate: 0.00002
  weight_decay: 0.01
  epochs: 2
